schema:
  - internal/graph/schema.graphqls

exec:
  filename: internal/graph/generated.go
  package: graph

model:
  filename: internal/graph/model/models_gen.go
  package: model

resolver:
  layout: follow-schema
  dir: internal/graph
  package: graph
  filename_template: "{name}.resolvers.go"

models:
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
  Tool:
    model:
      - github.com/smartcp/bifrost/internal/models.Tool
  RoutingDecision:
    model:
      - github.com/smartcp/bifrost/internal/models.RoutingDecision
  ExecutionResult:
    model:
      - github.com/smartcp/bifrost/internal/models.ExecutionResult
  SearchResult:
    model:
      - github.com/smartcp/bifrost/internal/models.SearchResult
  ToolEvent:
    model:
      - github.com/smartcp/bifrost/internal/models.ToolEvent
  RegisterToolInput:
    model:
      - github.com/smartcp/bifrost/internal/models.RegisterToolInput
  UpdateToolInput:
    model:
      - github.com/smartcp/bifrost/internal/models.UpdateToolInput
  ExecuteToolInput:
    model:
      - github.com/smartcp/bifrost/internal/models.ExecuteToolInput
