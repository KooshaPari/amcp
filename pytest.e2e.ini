# pytest configuration for E2E tests

[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    e2e: End-to-end tests (all services running)
    integration: Integration tests across services
    smoke: Fast smoke tests for basic validation
    slow: Slow tests (performance, load tests)
    bifrost: Bifrost Gateway tests
    smartcp: SmartCP MCP tests
    graphql: GraphQL backend tests
    grpc: gRPC service tests

# Test paths
testpaths = tests/e2e

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes
    -p no:cacheprovider

# Asyncio configuration
asyncio_mode = auto

# Timeout for async tests (seconds)
timeout = 60

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage (if enabled)
[coverage:run]
source = .
omit =
    tests/*
    */venv/*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = true
skip_covered = false
