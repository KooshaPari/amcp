[pytest]
# Pytest configuration for SmartCP

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    performance: Performance tests
    security: Security tests
    slow: Slow running tests
    fast: Fast running tests
    smoke: Smoke tests
    regression: Regression tests
    api: API tests
    database: Database tests
    cache: Cache tests
    critical: Critical path tests
    asyncio: Async tests

# Coverage
addopts = 
    --strict-markers
    --tb=short
    -v

# Minimum coverage
fail_under = 85

# Test paths
testpaths = .

# Timeout
timeout = 300

