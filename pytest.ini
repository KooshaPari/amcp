[pytest]
# Pytest configuration for SmartCP

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    performance: Performance tests
    security: Security tests
    slow: Slow running tests
    fast: Fast running tests
    smoke: Smoke tests
    regression: Regression tests
    api: API tests
    database: Database tests
    cache: Cache tests
    critical: Critical path tests
    asyncio: Async tests
    benchmark: Benchmark/performance tests
    load: Load/stress tests

# Pytest options
addopts =
    -p pytest_asyncio
    -p pytest_cov
    --strict-markers
    --tb=short
    -v

# Async mode configuration
asyncio_mode = auto

# Test paths
testpaths = .

# Python path - ensure project root is in path
pythonpath = .

